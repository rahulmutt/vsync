[tools]
"github:slsa-framework/slsa-verifier" = "2.7.1"
go = "1.26"

[tasks.build]
run = "go build -o dist/vsync ./cmd/vsync"

[tasks.deps]
description = "Download Go module dependencies"
run = "go mod download"

[tasks.tidy]
description = "Tidy go.mod and go.sum"
run = "go mod tidy"

[tasks.go-get]
description = "Add or update a Go dependency, then tidy modules"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ "$#" -lt 1 ]; then
  echo "usage: mise run go-get -- <module>@<version> [<module>@<version> ...]" >&2
  exit 2
fi

go get "$@"
go mod tidy
'''

[tasks.test-unit]
description = "Run unit tests"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ "$#" -eq 0 ]; then
  set -- ./...
fi

go test "$@"
'''

[tasks.test-integration]
description = "Start devenv Vault, run integration tests, and tear it down"
run = '''
#!/usr/bin/env bash
set -euo pipefail

cleanup() {
  devenv processes down >/dev/null 2>&1 || true
}

cleanup
trap cleanup EXIT

if [ "$#" -eq 0 ]; then
  set -- ./...
fi

devenv up --detach
devenv shell -- go test -tags integration "$@"
'''

[tasks.test]
description = "Run unit tests and devenv-backed integration tests"
run = '''
#!/usr/bin/env bash
set -euo pipefail

cleanup() {
  devenv processes down >/dev/null 2>&1 || true
}

cleanup
trap cleanup EXIT

go test ./...
devenv up --detach
devenv shell -- go test -tags integration ./...
'''

[tasks.coverage]
description = "Run unit and integration coverage checks"
run = '''
#!/usr/bin/env bash
set -euo pipefail

cleanup() {
  devenv processes down >/dev/null 2>&1 || true
}

cleanup
trap cleanup EXIT

go test -cover ./...
devenv up --detach
devenv shell -- go test -cover -tags integration ./...
'''

[tasks.install]
run = "go install ./cmd/vsync"

# Verify a published release's SLSA3 provenance end-to-end.
#
# Usage:
#   mise run verify -- <tag> [os-arch]
#
# Examples:
#   mise run verify -- v0.1.0                 # host os/arch
#   mise run verify -- v0.1.0 linux-amd64
#   mise run verify -- v0.1.0 darwin-arm64
#
# Requires: slsa-verifier (pinned via [tools] above) and `gh` logged in.
# The source URI is derived from `git remote get-url origin`, so this works
# for forks without editing the task.
[tasks.verify]
description = "Download a release binary + provenance and verify it with slsa-verifier"
run = '''
#!/usr/bin/env bash
set -euo pipefail

if [ $# -lt 1 ]; then
  echo "usage: mise run verify -- <tag> [os-arch]" >&2
  echo "  e.g. mise run verify -- v0.1.0 linux-amd64" >&2
  exit 2
fi

tag="$1"

# Default os-arch to the host platform, normalized to GOOS/GOARCH.
host_os="$(uname -s | tr '[:upper:]' '[:lower:]')"
case "$host_os" in
  darwin|linux) ;;
  *) echo "verify: unsupported host OS '$host_os' (only linux/darwin binaries are published)" >&2; exit 2 ;;
esac
host_arch="$(uname -m)"
case "$host_arch" in
  x86_64|amd64) host_arch="amd64" ;;
  aarch64|arm64) host_arch="arm64" ;;
  *) echo "verify: unsupported host arch '$host_arch'" >&2; exit 2 ;;
esac
os_arch="${2:-${host_os}-${host_arch}}"

binary="vsync-${os_arch}"
provenance="${binary}.intoto.jsonl"

# Derive github.com/owner/repo from the origin remote so this works on forks.
remote_url="$(git remote get-url origin)"
source_uri="$(echo "$remote_url" \
  | sed -E -e 's#^git@github\.com:#github.com/#' \
           -e 's#^https?://github\.com/#github.com/#' \
           -e 's#\.git$##')"
if [[ "$source_uri" != github.com/* ]]; then
  echo "verify: could not derive github source URI from '$remote_url'" >&2
  exit 1
fi

workdir="$(mktemp -d)"
trap 'rm -rf "$workdir"' EXIT

echo "==> Downloading $binary and $provenance for $tag from $source_uri"
gh release download "$tag" \
  --repo "${source_uri#github.com/}" \
  --pattern "$binary" \
  --pattern "$provenance" \
  --dir "$workdir"

echo "==> Verifying with slsa-verifier"
cd "$workdir"
slsa-verifier verify-artifact "$binary" \
  --provenance-path "$provenance" \
  --source-uri "$source_uri" \
  --source-tag "$tag"

echo "==> OK: $binary@$tag verified against $source_uri"
'''
